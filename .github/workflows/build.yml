name: Build & Push Images

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  OWNER: 4snt

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: api
            context: api
            image: bio-platform-api
          - service: r-worker
            context: r-worker
            image: bio-platform-rworker
          - service: frontend
            context: frontend
            image: bio-platform-frontend
            build_args: |
              NEXT_PUBLIC_API_URL=https://bioapi.flipafile.com
              NEXT_PUBLIC_WS_URL=wss://bioapi.flipafile.com
          - service: postgres
            context: db
            image: bio-platform-postgres

    steps:
      - uses: actions/checkout@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:latest
          build-args: ${{ matrix.build_args }}
