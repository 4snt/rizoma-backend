name: Build & Push Images

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  OWNER: 4snt

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: api
            context: api
            dockerfile: Dockerfile
            image: bio-platform-api
          - service: r-worker
            context: r-worker
            dockerfile: Dockerfile
            image: bio-platform-rworker
          - service: postgres
            context: .
            dockerfile: db/Dockerfile
            image: bio-platform-postgres
          - service: frontend
            context: frontend
            dockerfile: Dockerfile
            image: bio-platform-frontend
            build_args: |
              NEXT_PUBLIC_API_URL=https://bioapi.flipafile.com
              NEXT_PUBLIC_WS_URL=wss://bioapi.flipafile.com

    steps:
      - uses: actions/checkout@v4

      # Clona bio-frontend no lugar do frontend/ antigo (só no job de frontend)
      - name: Checkout bio-frontend
        if: matrix.service == 'frontend'
        uses: actions/checkout@v4
        with:
          repository: 4snt/bio-frontend
          token: ${{ secrets.GITHUB_TOKEN }}
          path: frontend

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:latest
          build-args: ${{ matrix.build_args }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:cache,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deploy
        run: |
          curl -fSs -X GET \
            "http://coolify.flipafile.com/api/v1/deploy?uuid=qoeswt6ssct46bv4l7nwlxnn&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
