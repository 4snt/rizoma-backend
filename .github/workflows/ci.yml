name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  tests:
    name: pytest + bandit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov bandit

      - name: Testes unitários e de integração (sem banco → db-gated são skip)
        run: pytest -q --cov=app --cov-report=term-missing

      - name: Análise de segurança (bandit)
        run: bandit -r app -ll || true   # não bloqueia o build; reporta findings
