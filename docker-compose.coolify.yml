name: bio-platform

# ─────────────────────────────────────────────────────────────────
#  Bio-Platform — Docker Compose para Coolify / produção
#
#  Como usar:
#  1. Copie .env.coolify.example → .env  e preencha as variáveis
#  2. No Coolify: aponte para este arquivo como "Docker Compose File"
#  3. Configure os domínios no Coolify para:
#       frontend  → porta 3005   (ex: app.meusite.com)
#       api       → porta 8005   (ex: api.meusite.com)
#       minio     → porta 9005   (console, ex: minio.meusite.com)
#
#  As únicas variáveis que mudam entre ambientes:
#    - NEXT_PUBLIC_API_URL / NEXT_PUBLIC_WS_URL  (URL pública da API)
#    - NEXTAUTH_URL                              (URL pública do frontend)
#    - CORS_ORIGINS                              (mesmo valor do frontend)
#    - Senhas / secrets
# ─────────────────────────────────────────────────────────────────

services:

  # ── Banco de dados ──────────────────────────────────────────────
  postgres:
    image: bio-platform-postgres:latest
    build:
      context: https://github.com/4snt/bio-platform.git#master:db
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-bioinformatica}
      POSTGRES_USER:     ${POSTGRES_USER:-api_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-api_user} -d ${POSTGRES_DB:-bioinformatica}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # ── Elasticsearch ───────────────────────────────────────────────
  elasticsearch:
    image: elasticsearch:8.13.0
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qv '\"status\":\"red\"'"]
      interval: 10s
      timeout: 10s
      retries: 12
    networks:
      - internal

  # ── MinIO (object storage) ──────────────────────────────────────
  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-changeme}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_CONSOLE_PORT:-9005}:9001"   # Console web (expor no Coolify se quiser acesso)
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # ── FastAPI ─────────────────────────────────────────────────────
  api:
    image: bio-platform-api:latest
    build:
      context: https://github.com/4snt/bio-platform.git#master:api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PORT:-8005}:8000"
    environment:
      # PostgreSQL
      POSTGRES_HOST:     postgres
      POSTGRES_PORT:     5432
      POSTGRES_DB:       ${POSTGRES_DB:-bioinformatica}
      POSTGRES_USER:     ${POSTGRES_USER:-api_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      # Elasticsearch
      ES_HOST: http://elasticsearch:9200
      # MinIO — endpoint interno para o backend se comunicar
      MINIO_ENDPOINT:        minio:9000
      # endpoint público: URL que o BROWSER usa para acessar as presigned URLs
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-localhost:9000}
      MINIO_ACCESS_KEY:  ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY:  ${MINIO_SECRET_KEY:-changeme}
      MINIO_SECURE:      ${MINIO_SECURE:-false}
      # Auth
      GOOGLE_CLIENT_ID:      ${GOOGLE_CLIENT_ID}
      JWT_SECRET:            ${JWT_SECRET}
      ALLOWED_EMAIL_DOMAIN:  ${ALLOWED_EMAIL_DOMAIN:-@ufvjm.edu.br}
      JWT_ACCESS_MINUTES:    ${JWT_ACCESS_MINUTES:-60}
      # CORS — lista separada por vírgula das origens permitidas
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3005}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - internal

  # ── R Worker ────────────────────────────────────────────────────
  r-worker:
    image: bio-platform-rworker:latest
    build:
      context: https://github.com/4snt/bio-platform.git#master:r-worker
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_HOST:     postgres
      POSTGRES_PORT:     5432
      POSTGRES_DB:       ${POSTGRES_DB:-bioinformatica}
      POSTGRES_USER:     ${POSTGRES_USER:-r_worker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      ES_HOST:           http://elasticsearch:9200
      MINIO_ENDPOINT:    minio:9000
      MINIO_ACCESS_KEY:  ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY:  ${MINIO_SECRET_KEY:-changeme}
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - internal

  # ── Frontend Next.js ────────────────────────────────────────────
  frontend:
    image: bio-platform-frontend:latest
    build:
      context: https://github.com/4snt/bio-platform.git#master:frontend
      dockerfile: Dockerfile
      args:
        # ATENÇÃO: estas variáveis ficam embutidas no bundle JS — devem ser
        # as URLs PÚBLICAS que o browser do usuário vai usar para chamar a API
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8005}
        NEXT_PUBLIC_WS_URL:  ${NEXT_PUBLIC_WS_URL:-ws://localhost:8005}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3005}:3000"
    environment:
      NODE_ENV:       production
      NEXTAUTH_URL:   ${NEXTAUTH_URL:-http://localhost:3005}
      AUTH_SECRET:    ${AUTH_SECRET}
      NEXTAUTH_SECRET: ${AUTH_SECRET}
      GOOGLE_CLIENT_ID:     ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      # URL interna — usada pelo NextAuth no servidor para chamar a API (sem passar pelo browser)
      API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal

# ── Volumes persistentes ────────────────────────────────────────
volumes:
  pg_data:
  es_data:
  minio_data:

# ── Rede interna (serviços se comunicam pelo nome do serviço) ───
networks:
  internal:
    driver: bridge
