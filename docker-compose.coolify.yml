name: bio-platform

# ─────────────────────────────────────────────────────────────────
#  Bio-Platform — Docker Compose para Coolify / produção
#  Imagens buildadas via GitHub Actions e publicadas no ghcr.io
# ─────────────────────────────────────────────────────────────────

services:

  postgres:
    image: ghcr.io/4snt/bio-platform-postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-bioinformatica}
      POSTGRES_USER:     ${POSTGRES_USER:-api_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-api_user} -d ${POSTGRES_DB:-bioinformatica}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  elasticsearch:
    image: elasticsearch:8.13.0
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qv '\"status\":\"red\"'"]
      interval: 10s
      timeout: 10s
      retries: 12
    networks:
      - internal

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-changeme}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_CONSOLE_PORT:-9005}:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  api:
    image: ghcr.io/4snt/bio-platform-api:latest
    restart: unless-stopped
    ports:
      - "${API_PORT:-8005}:8000"
    environment:
      POSTGRES_HOST:         postgres
      POSTGRES_PORT:         5432
      POSTGRES_DB:           ${POSTGRES_DB:-bioinformatica}
      POSTGRES_USER:         ${POSTGRES_USER:-api_user}
      POSTGRES_PASSWORD:     ${POSTGRES_PASSWORD:-changeme}
      ES_HOST:               http://elasticsearch:9200
      MINIO_ENDPOINT:        minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-localhost:9000}
      MINIO_ACCESS_KEY:      ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY:      ${MINIO_SECRET_KEY:-changeme}
      MINIO_SECURE:          ${MINIO_SECURE:-false}
      GOOGLE_CLIENT_ID:      ${GOOGLE_CLIENT_ID}
      JWT_SECRET:            ${JWT_SECRET}
      ALLOWED_EMAIL_DOMAIN:  ${ALLOWED_EMAIL_DOMAIN:-@ufvjm.edu.br}
      JWT_ACCESS_MINUTES:    ${JWT_ACCESS_MINUTES:-60}
      CORS_ORIGINS:          ${CORS_ORIGINS:-http://localhost:3005}
      LOG_LEVEL:             ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - internal

  r-worker:
    image: ghcr.io/4snt/bio-platform-rworker:latest
    restart: unless-stopped
    environment:
      POSTGRES_HOST:     postgres
      POSTGRES_PORT:     5432
      POSTGRES_DB:       ${POSTGRES_DB:-bioinformatica}
      POSTGRES_USER:     ${POSTGRES_USER:-api_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      ES_HOST:           http://elasticsearch:9200
      MINIO_ENDPOINT:    minio:9000
      MINIO_ACCESS_KEY:  ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY:  ${MINIO_SECRET_KEY:-changeme}
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - internal

  frontend:
    image: ghcr.io/4snt/bio-platform-frontend:latest
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3005}:3000"
    environment:
      NODE_ENV:            production
      NEXTAUTH_URL:        ${NEXTAUTH_URL:-http://localhost:3005}
      AUTH_SECRET:         ${AUTH_SECRET}
      NEXTAUTH_SECRET:     ${AUTH_SECRET}
      GOOGLE_CLIENT_ID:    ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      API_URL:             http://api:8000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal

volumes:
  pg_data:
  es_data:
  minio_data:

networks:
  internal:
    driver: bridge
